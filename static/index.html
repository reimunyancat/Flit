<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flit</title>
    <meta name="theme-color" content="#2dd672" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font:
          15px/1.5 -apple-system,
          system-ui,
          sans-serif;
        margin: 0;
        background: #0f0f0f;
        color: #f0f0f0;
      }
      header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        border-bottom: 1px solid #2a2a2a;
        position: sticky;
        top: 0;
        background: #0f0f0f;
        z-index: 5;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
        display: flex;
        align-items: center;
      }
      header label {
        font-size: 13px;
        color: #cfcfcf;
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .composer {
        display: flex;
        gap: 8px;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 8px;
        background: #1b1b1b;
        margin-bottom: 14px;
      }
      .composer textarea {
        flex: 1;
        border: 0;
        resize: none;
        background: #1b1b1b;
        color: #f0f0f0;
        font: inherit;
        outline: none;
        min-height: 44px;
      }
      .composer textarea::placeholder {
        color: #777;
      }
      button {
        border: 0;
        border-radius: 9px;
        padding: 8px 12px;
        background: #2dd672;
        color: #03150c;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: #2f2f2f;
        color: #f0f0f0;
      }
      .card {
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: #1b1b1b;
        color: #f0f0f0;
      }
      .card .meta {
        font-size: 12px;
        color: #9a9a9a;
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
      }
      .card .meta .del {
        margin-left: auto;
        cursor: pointer;
        color: #9a9a9a;
      }
      .card pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font: inherit;
        color: #f0f0f0;
      }
      .card a {
        color: #5fd0ff;
      }
      .tag {
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #status {
        font-size: 12px;
        color: #9a9a9a;
        margin-left: auto;
      }
      .toast {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        background: #2dd672;
        color: #03150c;
        padding: 8px 14px;
        border-radius: 20px;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
        font-weight: 600;
      }
      .toast.show {
        opacity: 1;
      }
      .dropzone {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 15, 15, 0.85);
        border: 3px dashed #2dd672;
        color: #2dd672;
        font-size: 22px;
        font-weight: 700;
        z-index: 20;
        pointer-events: none;
      }
      .dropzone.show {
        display: flex;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        <img
          src="/icon.svg"
          width="22"
          height="22"
          alt=""
          style="margin-right: 7px"
        />Flit
      </h1>
      <label
        ><input type="checkbox" id="autocopy" checked /><span
          data-i18n="autocopyLabel"
          >자동 복사</span
        ></label
      >
      <button class="secondary" id="clear" data-i18n="clear">
        전체 지우기
      </button>
      <span id="status" data-i18n="connecting">연결 중...</span>
      <button class="secondary" id="lang">EN</button>
    </header>
    <main>
      <div class="composer">
        <textarea
          id="text"
          placeholder="텍스트나 링크를 붙여넣고 Enter..."
          data-i18n-ph="placeholder"
        ></textarea>
        <div style="display: flex; flex-direction: column; gap: 6px">
          <button id="send" data-i18n="send">보내기</button>
          <label class="secondary" style="cursor: pointer; text-align: center"
            ><span data-i18n="file">파일</span
            ><input type="file" id="file" multiple style="display: none"
          /></label>
        </div>
      </div>
      <div id="list"></div>
    </main>
    <div class="toast" id="toast"></div>
    <div class="dropzone" id="dropzone">
      <span data-i18n="dropHere">여기에 놓으세요</span>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
