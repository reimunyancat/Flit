<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flit</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2dd672" />
    <link rel="icon" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>
        <img
          src="./icon.svg"
          width="22"
          height="22"
          alt="Flit"
          style="vertical-align: -4px; margin-right: 7px"
        />Flit
      </h1>
      <label
        ><input type="checkbox" id="autocopy" checked />
        <span data-i18n="autocopy">Auto-copy</span></label
      >
      <input
        type="password"
        id="pass"
        placeholder="Passphrase (E2E)"
        data-i18n-ph="pass_ph"
      />
      <button class="secondary" id="pair" data-i18n="pair">QR</button>
      <button class="secondary" id="drop" data-i18n="drop">Drop link</button>
      <button class="secondary" id="clear" data-i18n="claer">Clear all</button>
      <button class="secondary" id="lang" title="Language / 언어"></button>
      <span
        id="status"
        style="font-size: 12px; opacity: 0.6; margin-left: auto"
        data-i18n="connecting"
        >Connecting...</span
      >
    </header>
    <main>
      <div class="composer">
        <textarea
          id="text"
          placeholder="Paste text or a link, hit Enter..."
          data-i18n-ph="compose_ph"
        ></textarea>
        <div style="display: flex; flex-direction: column; gap: 6px">
          <button id="send" data-i18n="send">Send</button>
          <label
            style="
              cursor: pointer;
              border-radius: 9px;
              padding: 8px 12px;
              background: #8884;
              text-align: center;
            "
            ><span data-i18n="file">File</span
            ><input type="file" id="file" multiple style="display: none"
          /></label>
        </div>
      </div>
      <div id="list"></div>
    </main>
    <div class="modal" id="modal">
      <div class="modal-box">
        <div style="font-weight: 600; margin-bottom: 10px" data-i18n="scan">
          Scan from another device
        </div>
        <img id="qrimg" alt="pairing QR" />
        <code id="pairurl"></code>
        <button
          class="secondary"
          data-i18n="close"
          onclick="document.getElementById('modal').classList.remove('show')"
        >
          Close
        </button>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
