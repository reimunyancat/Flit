<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, inintial-scale=1" />
    <title>Flit</title>
    <meta name="theme-color" content="#2dd672" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font:
          15px/1.5 -apple-system,
          system-ui,
          sans-serif;
        margin: 0;
        background: #0f0f0f;
        color: #f0f0f0;
      }
      header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        border-bottom: 1px solid #2a2a2a;
        position: sticky;
        top: 0;
        background: #0f0f0f;
        z-index: 5;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
        display: flex;
        align-items: center;
      }
      header label {
        font-size: 13px;
        color: #cfcfcf;
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .composer {
        display: flex;
        gap: 8px;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 8px;
        background: #1b1b1b;
        margin-bottom: 14px;
      }
      .composer textarea {
        flex: 1;
        border: 0;
        resize: none;
        background: #1b1b1b;
        color: #f0f0f0;
        font: inherit;
        outline: none;
        min-height: 44px;
      }
      .composer textarea::placeholder {
        color: #777;
      }
      button {
        border: 0;
        border-radius: 9px;
        padding: 8px 12px;
        background: #2dd672;
        color: #03150c;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: #2f2f2f;
        color: #f0f0f0;
      }
      .card {
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: #1b1b1b;
        color: #f0f0f0;
      }
      .card .meta {
        font-size: 12px;
        color: #9a9a9a;
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
      }
      .card .meta .del {
        margin-left: auto;
        cursor: pointer;
        color: #9a9a9a;
      }
      .card pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font: inherit;
        color: #f0f0f0;
      }
      .card a {
        color: #5fd0ff;
      }
      .tag {
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #status {
        font-size: 12px;
        color: #9a9a9a;
        margin-left: auto;
      }
      .toast {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        background: #2dd672;
        color: #03150c;
        padding: 8px 14px;
        border-radius: 20px;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
        font-weight: 600;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        <svg
          width="22"
          height="22"
          viewBox="0 0 512 512"
          aria-hidden="true"
          style="margin-right: 7px"
        >
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#34de77" />
              <stop offset="1" stop-color="#12a552" />
            </linearGradient>
          </defs>
          <rect width="512" height="512" rx="112" fill="url(#bg)" />
          <path d="M270 195 L172 336 L330 269 Z" fill="#fff" />
          <circle cx="300" cy="232" r="48" fill="#fff" /></svg
        >Flit
      </h1>
      <label><input type="checkbox" id="autocopy" checked />자동 복사</label>
      <button class="secondary" id="clear">전체 지우기</button>
      <span id="status">연결 중...</span>
    </header>
    <main>
      <div class="composer">
        <textarea
          id="text"
          placeholder="텍스트나 링크를 붙여넣고 Enter..."
        ></textarea>
        <div style="display: flex; flex-direction: column; gap: 6px">
          <button id="send">보내기</button>
          <label class="secondary" style="cursor: pointer; text-align: center"
            >파일<input type="file" id="file" multiple style="display: none"
          /></label>
        </div>
      </div>
      <div id="list"></div>
    </main>
    <div class="toast" id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
