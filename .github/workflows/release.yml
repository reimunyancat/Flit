name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: package
        run: |
          mkdir -p dist
          cp target/release/flit-server dist/flit-server-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: flit-server-linux-x86_64
          path: dist/flit-server-linux-x86_64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: package
        run: |
          mkdir -p dist
          cp target/release/flit-server dist/flit-server-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: flit-server-macos-arm64
          path: dist/flit-server-macos-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/flit-server.exe dist/flit-server-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: flit-server-windows-x86_64.exe
          path: dist/flit-server-windows-x86_64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
